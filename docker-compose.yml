version: '3.8'

services:
  # 1. La base de données PostgreSQL
  db:
    image: postgres:16
    container_name: autohall_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: autohall_monitor
    ports:
      - "5432:5432"

  # 2. Le Backend Python
  backend:
    build: ./backend
    container_name: autohall_backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:admin@db:5432/autohall_monitor

